<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stark Jet - Coffee Shop</title>
  <link rel="icon" type="image/png" href="images/ロゴ.png" />
  <link rel="apple-touch-icon" href="images/ロゴ.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>
  <script>
const { useState, useEffect, useRef, createElement: h, Fragment } = React;

// Section data
const sections = [
  {
    id: 1,
    title: "Stark Jet",
    image: "images/コーヒーとコーヒー豆1.png",
    detailTitle: "Welcome to Stark Jet",
    description: "深煎りの豆と心地よい空間で、最高の一杯をお届けします。2015年の創業以来、こだわり抜いたコーヒーと温かいおもてなしで、多くのお客様にご愛顧いただいております。",
    link: "#about",
    linkText: "About Us"
  },
  {
    id: 2,
    title: "Philosophy",
    image: "images/コーヒー豆1.png",
    detailTitle: "Our Philosophy",
    description: "一杯のコーヒーに込める想い。厳選された産地から直接仕入れた豆を、熟練のロースターが丁寧に焙煎。豆本来の風味を最大限に引き出すことに全力を注いでいます。",
    link: "#philosophy",
    linkText: "Learn More"
  },
  {
    id: 3,
    title: "Location",
    image: "images/ロケーション1.png",
    detailTitle: "Our Space",
    description: "落ち着いた雰囲気の店内で、ゆったりとした時間をお過ごしください。木のぬくもりを感じる内装と、自然光が差し込む大きな窓が特徴です。Wi-Fi完備、電源席もご用意しております。",
    link: "#location",
    linkText: "View Map"
  },
  {
    id: 4,
    title: "Sale",
    image: "images/コーヒー豆パック1.png",
    detailTitle: "Coffee Beans",
    description: "ご自宅でもStark Jetの味をお楽しみいただけます。エチオピア、コロンビア、ケニアなど、世界各地から厳選した豆を販売中。オンラインショップでもお買い求めいただけます。",
    link: "#shop",
    linkText: "Shop Now"
  },
  {
    id: 5,
    title: "VISIT US",
    image: "images/カフェ外観1.png",
    detailTitle: "Come Visit",
    description: "東京都渋谷区神南1-2-3 Stark Jet Building 1F\n営業時間: 8:00 - 21:00（年中無休）\n最寄り駅: 渋谷駅 徒歩5分",
    link: "#contact",
    linkText: "Get Directions"
  }
];

// Arrow icon component
function ArrowIcon() {
  return h('svg', { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
    h('line', { x1: "5", y1: "12", x2: "19", y2: "12" }),
    h('polyline', { points: "12 5 19 12 12 19" })
  );
}

// Chevron down icon
function ChevronDown() {
  return h('svg', { className: "nav-hint-arrow", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
    h('polyline', { points: "6 9 12 15 18 9" })
  );
}

// Section component
function Section({ data, isExpanded, onToggle }) {
  return h('section', { className: "section", id: "section-" + data.id },
    h('div', { className: "section-left", onClick: onToggle },
      h('div', { className: "title-row" },
        h('h2', { className: "section-title" }, data.title)
      ),
      h('div', { className: "detail-panel" + (isExpanded ? " active" : "") },
        h('div', { className: "detail-content" },
          h('h3', { className: "detail-title" }, data.detailTitle),
          h('p', { className: "detail-description" }, data.description),
          h('a', { href: data.link, className: "detail-link" },
            data.linkText,
            h(ArrowIcon)
          )
        ),
        h('span', { className: "close-hint" }, "Click to close")
      )
    ),
    h('div', { className: "section-right" },
      h('img', {
        src: data.image,
        alt: data.title,
        className: "section-image",
        loading: "lazy"
      })
    )
  );
}

// Scroll indicator component
function ScrollIndicator({ totalSections, activeSection, onDotClick }) {
  const dots = [];
  for (let i = 0; i < totalSections; i++) {
    dots.push(
      h('div', {
        key: i,
        className: "scroll-dot" + (activeSection === i ? " active" : ""),
        onClick: function() { onDotClick(i); },
        "aria-label": "Go to section " + (i + 1)
      })
    );
  }
  return h('div', { className: "scroll-indicator" }, dots);
}

// Main App component
function App() {
  const expandedSectionState = useState(null);
  const expandedSection = expandedSectionState[0];
  const setExpandedSection = expandedSectionState[1];

  const activeSectionState = useState(0);
  const activeSection = activeSectionState[0];
  const setActiveSection = activeSectionState[1];

  const containerRef = useRef(null);

  useEffect(function() {
    const container = containerRef.current;
    if (!container) return;

    function handleScroll() {
      const scrollTop = container.scrollTop;
      const sectionHeight = window.innerHeight;
      const newActiveSection = Math.round(scrollTop / sectionHeight);

      if (newActiveSection !== activeSection) {
        setActiveSection(newActiveSection);
        setExpandedSection(null);
      }
    }

    container.addEventListener('scroll', handleScroll);
    return function() {
      container.removeEventListener('scroll', handleScroll);
    };
  }, [activeSection]);

  function handleDotClick(index) {
    const container = containerRef.current;
    if (!container) return;

    setExpandedSection(null);
    container.scrollTo({
      top: index * window.innerHeight,
      behavior: 'smooth'
    });
  }

  function handleToggle(sectionId) {
    setExpandedSection(expandedSection === sectionId ? null : sectionId);
  }

  const showScrollHint = activeSection === 0 && !expandedSection;

  const sectionElements = sections.map(function(section) {
    return h(Section, {
      key: section.id,
      data: section,
      isExpanded: expandedSection === section.id,
      onToggle: function() { handleToggle(section.id); }
    });
  });

  return h(Fragment, null,
    h('div', { className: "scroll-container", ref: containerRef }, sectionElements),
    h(ScrollIndicator, {
      totalSections: sections.length,
      activeSection: activeSection,
      onDotClick: handleDotClick
    }),
    showScrollHint ? h('div', { className: "nav-hint" },
      h('span', null, "Scroll"),
      h(ChevronDown)
    ) : null
  );
}

// Render the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
  </script>
</body>
</html>
