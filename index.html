// Arrow icon component
function ArrowIcon() {
  return h('svg', { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
    h('line', { x1: "5", y1: "12", x2: "19", y2: "12" }),
    h('polyline', { points: "12 5 19 12 12 19" })
  );
}

// Particle Text Animation Component
function ParticleText(props) {
  var text = props.text;
  var isVisible = props.isVisible;
  var canvasRef = useRef(null);
  var particlesRef = useRef([]);
  var animationRef = useRef(null);
  var initializedRef = useRef(false);

  useEffect(function() {
    var canvas = canvasRef.current;
    if (!canvas) return;

    var ctx = canvas.getContext('2d');
    var width = canvas.offsetWidth;
    var height = canvas.offsetHeight;
    canvas.width = width * 2;
    canvas.height = height * 2;
    ctx.scale(2, 2);

    // Create particles from text
    function createParticles() {
      var fontSize = Math.min(width * 0.15, 80);
      ctx.fillStyle = '#f0ece4';
      ctx.font = 'bold ' + fontSize + 'px Helvetica Neue, Arial, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';

      // Clear and draw text to sample pixels
      ctx.clearRect(0, 0, width, height);
      ctx.fillText(text, 20, height / 2);

      var imageData = ctx.getImageData(0, 0, width * 2, height * 2);
      var pixels = imageData.data;
      var particles = [];
      var gap = 4; // Sample every 4 pixels

      for (var y = 0; y < height * 2; y += gap) {
        for (var x = 0; x < width * 2; x += gap) {
          var i = (y * width * 2 + x) * 4;
          if (pixels[i + 3] > 128) { // If pixel is visible
            particles.push({
              x: x / 2,
              y: y / 2,
              targetX: x / 2,
              targetY: y / 2,
              originX: Math.random() * width - width / 2,
              originY: Math.random() * height + height,
              z: Math.random() * 100 - 50,
              size: Math.random() * 2 + 1,
              speed: Math.random() * 0.02 + 0.02
            });
          }
        }
      }
      return particles;
    }

    if (!initializedRef.current) {
      particlesRef.current = createParticles();
      initializedRef.current = true;
    }

    // Animation loop
    function animate() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#f0ece4';

      var particles = particlesRef.current;
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];

        if (isVisible) {
          // Move towards target
          p.x += (p.targetX - p.x) * p.speed;
          p.y += (p.targetY - p.y) * p.speed;
          p.z += (0 - p.z) * p.speed;
        } else {
          // Move towards scattered position
          p.x += (p.originX - p.x) * 0.05;
          p.y += (p.originY - p.y) * 0.05;
        }

        // 3D perspective
        var scale = 1 + p.z / 500;
        var size = p.size * scale;

        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fill();

        // Draw connecting lines to nearby particles
        if (isVisible && i < particles.length - 1) {
          var nextP = particles[i + 1];
          var dx = nextP.x - p.x;
          var dy = nextP.y - p.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 15) {
            ctx.strokeStyle = 'rgba(240, 236, 228, 0.1)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(nextP.x, nextP.y);
            ctx.stroke();
          }
        }
      }

      animationRef.current = requestAnimationFrame(animate);
    }

    animate();

    return function() {
      if (animationRef.current) {
        cancelAnimationFrame(animationRef.current);
      }
    };
  }, [text, isVisible]);

  return h('canvas', {
    ref: canvasRef,
    className: 'particle-canvas'
  });
}

// Section component for main view
function Section(props) {
  var data = props.data;
  var onClick = props.onClick;
  var sectionRef = props.sectionRef;
  var isVisible = props.isVisible;

  return h('section', {
    className: "section" + (isVisible ? " visible" : ""),
    id: "section-" + data.id,
    onClick: onClick,
    ref: sectionRef
  },
    h('div', { className: "section-left" },
      h('div', { className: "title-row" },
        h(ParticleText, { text: data.title, isVisible: isVisible })
      )
    ),
    h('div', { className: "section-right" },
      h('img', {
        src: data.image,
        alt: data.title,
        className: "section-image",
        loading: "lazy"
      })
    )
  );
}

// Detail View with expanding animation
function DetailView(props) {
  var data = props.data;
  var isActive = props.isActive;
  var isExpanded = props.isExpanded;
  var initialRect = props.initialRect;
  var onClose = props.onClose;

  useEffect(function() {
    function handleKeyDown(e) {
      if (e.key === 'Escape' && isActive) {
        onClose();
      }
    }
    document.addEventListener('keydown', handleKeyDown);
    return function() {
      document.removeEventListener('keydown', handleKeyDown);
    };
  }, [isActive, onClose]);

  if (!data) return null;

  var galleryImages = data.gallery.map(function(src, index) {
    return h('img', {
      key: index,
      src: src,
      alt: data.title + " - Image " + (index + 1),
      className: "gallery-image"
    });
  });

  var metaItems = data.meta.map(function(item, index) {
    return h('div', { key: index, className: "detail-meta-item" },
      h('span', { className: "detail-meta-label" }, item.label),
      h('span', { className: "detail-meta-value" }, item.value)
    );
  });

  var frameStyle = initialRect ? {
    top: initialRect.top + 'px',
    left: initialRect.left + 'px',
    width: initialRect.width + 'px',
    height: initialRect.height + 'px'
  } : {};

  // Handle click to close - stop propagation on links to prevent closing
  function handleFrameClick(e) {
    // Don't close if clicking on a link
    if (e.target.tagName === 'A' || e.target.closest('a')) {
      return;
    }
    onClose();
  }

  return h('div', { className: "detail-overlay" + (isActive ? " active" : "") },
    h('div', {
      className: "expanding-frame" + (isExpanded ? " expanded" : ""),
      style: frameStyle,
      onClick: handleFrameClick
    },
      h('div', { className: "detail-content-wrapper" },
        h('div', { className: "detail-left" },
          h('div', { className: "detail-header" },
            h('h1', { className: "detail-title" }, data.title),
            h('p', { className: "detail-subtitle" }, data.subtitle)
          ),
          h('p', { className: "detail-description" }, data.description),
          h('div', { className: "detail-meta" }, metaItems),
          h('a', { href: data.link, className: "detail-link" },
            data.linkText,
            h(ArrowIcon)
          )
        ),
        h('div', { className: "detail-right" },
          h('div', { className: "gallery" }, galleryImages)
        )
      )
    )
  );
}

// Main App component
function App() {
  var selectedState = useState(null);
  var selectedSection = selectedState[0];
  var setSelectedSection = selectedState[1];

  var rectState = useState(null);
  var initialRect = rectState[0];
  var setInitialRect = rectState[1];

  var expandedState = useState(false);
  var isExpanded = expandedState[0];
  var setIsExpanded = expandedState[1];

  var currentSectionState = useState(0);
  var currentSection = currentSectionState[0];
  var setCurrentSection = currentSectionState[1];

  var containerRef = useRef(null);
  var sectionRefs = useRef([]);
  var isScrollingRef = useRef(false);
  var scrollTimeoutRef = useRef(null);
  var lastScrollTopRef = useRef(0);
  var currentSectionRef = useRef(0);

  // Custom smooth scroll function with adjustable duration
  // Matching reference site's cubic-bezier(.52, 0, 0, 1) easing
  function smoothScrollTo(container, targetScroll, duration) {
    var startScroll = container.scrollTop;
    var distance = targetScroll - startScroll;
    var startTime = null;

    // Attempt to match cubic-bezier(.52, 0, 0, 1)
    // This curve starts moderately fast, then decelerates strongly
    function customEase(t) {
      // Strong deceleration curve - matches reference site feel
      // Starts with momentum, slows down gracefully at the end
      return 1 - Math.pow(1 - t, 4);
    }

    function animation(currentTime) {
      if (startTime === null) startTime = currentTime;
      var elapsed = currentTime - startTime;
      var progress = Math.min(elapsed / duration, 1);
      var easeProgress = customEase(progress);

      container.scrollTop = startScroll + (distance * easeProgress);

      if (progress < 1) {
        requestAnimationFrame(animation);
      }
    }

    requestAnimationFrame(animation);
  }

  // Custom scroll handling with loop and slow transition
  useEffect(function() {
    var container = containerRef.current;
    if (!container) return;

    var viewportHeight = window.innerHeight;
    var thresholdRatio = 0.30; // 30% of viewport height

    function handleScroll() {
      if (isScrollingRef.current) return;

      // Clear any pending timeout
      if (scrollTimeoutRef.current) {
        clearTimeout(scrollTimeoutRef.current);
      }

      // Set timeout to check scroll position after user stops scrolling
      scrollTimeoutRef.current = setTimeout(function() {
        var newScrollTop = container.scrollTop;
        var currentSectionStart = currentSectionRef.current * viewportHeight;
        var offsetFromSection = newScrollTop - currentSectionStart;
        var offsetRatio = offsetFromSection / viewportHeight;

        var targetSection;

        if (offsetRatio >= thresholdRatio) {
          // Scrolled down 30% or more - go to next section
          targetSection = currentSectionRef.current + 1;
        } else if (offsetRatio <= -thresholdRatio) {
          // Scrolled up 30% or more - go to previous section
          targetSection = currentSectionRef.current - 1;
        } else {
          // Less than 30% - snap back to current section
          if (Math.abs(offsetFromSection) > 1) {
            isScrollingRef.current = true;
            smoothScrollTo(container, currentSectionStart, 1200);
            setTimeout(function() {
              isScrollingRef.current = false;
            }, 1300);
          }
          return;
        }

        // Loop handling
        if (targetSection >= sections.length) {
          // At last section, loop to first
          targetSection = 0;
        } else if (targetSection < 0) {
          // At first section scrolling up, loop to last
          targetSection = sections.length - 1;
        }

        // Smooth scroll to target section
        isScrollingRef.current = true;
        var targetScroll = targetSection * viewportHeight;

        // Slow transition (1200ms) for smooth, deliberate feel
        smoothScrollTo(container, targetScroll, 1200);

        currentSectionRef.current = targetSection;
        setCurrentSection(targetSection);

        // Reset scrolling flag after animation
        setTimeout(function() {
          isScrollingRef.current = false;
        }, 1300);
      }, 50); // Quick response (50ms) for immediate feel
    }

    container.addEventListener('scroll', handleScroll, { passive: true });

    return function() {
      container.removeEventListener('scroll', handleScroll);
      if (scrollTimeoutRef.current) {
        clearTimeout(scrollTimeoutRef.current);
      }
    };
  }, []);

  function handleSectionClick(sectionData, index) {
    var sectionEl = sectionRefs.current[index];
    if (sectionEl) {
      var rect = sectionEl.getBoundingClientRect();
      setInitialRect(rect);
      setSelectedSection(sectionData);

      // Trigger expansion after a small delay for the initial position to be set
      setTimeout(function() {
        setIsExpanded(true);
      }, 50);
    }
  }

  function handleClose() {
    setIsExpanded(false);
    // Wait for collapse animation (0.6s), then hide
    setTimeout(function() {
      setSelectedSection(null);
      setInitialRect(null);
    }, 600);
  }

  var sectionElements = sections.map(function(section, index) {
    return h(Section, {
      key: section.id,
      data: section,
      sectionRef: function(el) { sectionRefs.current[index] = el; },
      onClick: function() { handleSectionClick(section, index); },
      isVisible: index === currentSection
    });
  });

  return h(Fragment, null,
    h('div', {
      className: "scroll-container" + (selectedSection ? " hidden" : ""),
      ref: containerRef
    }, sectionElements),
    h(DetailView, {
      data: selectedSection,
      isActive: selectedSection !== null,
      isExpanded: isExpanded,
      initialRect: initialRect,
      onClose: handleClose
    })
  );
}

// Render the app
var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
  </script>
