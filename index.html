<body>
  <div id="root"></div>
  <script>
var useState = React.useState;
var useRef = React.useRef;
var useEffect = React.useEffect;
var useCallback = React.useCallback;
var h = React.createElement;
var Fragment = React.Fragment;

// Section data with multiple images for gallery
var sections = [

  {

    meta: [

    ],
    link: "#philosophy",
    linkText: "詳しく見る",
    gallery: [
      "images/コーヒー豆1.png",

    ]
  },
  {
    id: 3,
    title: "Roasting",
    image: "images/ロケーション1.png",
    subtitle: "Our Roasting",
    description: "ドイツ製PROBAT社のUG22とオランダ製GIESEN社のW6Aの2台の焙煎機を導入し、スペシャルティコーヒーに詰まった「素材由来の果実味」を最大限に引き出し仕上げています。\nデータ化された焙煎プロファイルを基に、ロースティングチームでのテイスティング、ディスカッションを重ね日々焙煎の研究を行なっています。",
    meta: [

    ],

  },
  {
    id: 4,
    title: "Sale",

    subtitle: "Coffee Beans",
    description: "ご自宅でもStark Jetの味をお楽しみいただけます。エチオピア、コロンビア、ケニアなど、世界各地から厳選した豆を販売中。オンラインショップでもお買い求めいただけます。贈り物にも最適なギフトセットもご用意しております。",

  },
  {

    meta: [

// Arrow icon component
function ArrowIcon() {
  return h('svg', { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" },
    h('line', { x1: "5", y1: "12", x2: "19", y2: "12" }),
    h('polyline', { points: "12 5 19 12 12 19" })
  );
}

// Loading Screen Component
function LoadingScreen(props) {
  var isVisible = props.isVisible;
  var progress = props.progress;

  return h('div', { className: 'loading-screen' + (isVisible ? '' : ' hidden') },
    h('div', { className: 'loading-content' },
      h('img', {
        src: 'images/ロゴ.png',
        alt: 'Stark Jet',
        className: 'loading-logo'
      }),
      h('div', { className: 'loading-progress-bar' },
        h('div', {
          className: 'loading-progress-fill',
          style: { width: progress + '%' }
        })
      ),
      h('span', { className: 'loading-text' }, 'Loading...')
    )
  );
}

// Particle Text Animation Component
function ParticleText(props) {
  var text = props.text;
  var isVisible = props.isVisible;
  var canvasRef = useRef(null);
  var particlesRef = useRef([]);
  var animationRef = useRef(null);
  var initializedRef = useRef(false);

  useEffect(function() {
    var canvas = canvasRef.current;
    if (!canvas) return;

    var ctx = canvas.getContext('2d');
    var width = canvas.offsetWidth;
    var height = canvas.offsetHeight;
    canvas.width = width * 2;
    canvas.height = height * 2;
    ctx.scale(2, 2);

    // Create particles from text
    function createParticles() {
      var fontSize = Math.min(width * 0.18, 90);
      ctx.fillStyle = '#f0ece4';
      ctx.font = '700 ' + fontSize + 'px "Helvetica Neue", Helvetica, Arial, sans-serif';
      ctx.letterSpacing = '-0.012em';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';

      // Clear and draw text to sample pixels
      ctx.clearRect(0, 0, width, height);
      ctx.fillText(text, 20, height / 2);

      var imageData = ctx.getImageData(0, 0, width * 2, height * 2);
      var pixels = imageData.data;
      var particles = [];
      var gap = 2; // Denser sampling for more solid text appearance

      for (var y = 0; y < height * 2; y += gap) {
        for (var x = 0; x < width * 2; x += gap) {
          var i = (y * width * 2 + x) * 4;
          if (pixels[i + 3] > 128) { // If pixel is visible
            var originX = Math.random() * width - width / 2;
            var originY = Math.random() * height + height;
            particles.push({
              x: originX,  // Start from scattered position
              y: originY,
              targetX: x / 2,
              targetY: y / 2,
              originX: originX,
              originY: originY,
              z: Math.random() * 100 - 50,
              size: 1.2, // Consistent size for cleaner text
              speed: Math.random() * 0.03 + 0.03
            });
          }
        }
      }
      return particles;
    }

    if (!initializedRef.current) {
      particlesRef.current = createParticles();
      initializedRef.current = true;
    }

    // Animation loop
    function animate() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#f0ece4';

      var particles = particlesRef.current;
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];

        if (isVisible) {
          // Move towards target
          p.x += (p.targetX - p.x) * p.speed;
          p.y += (p.targetY - p.y) * p.speed;
          p.z += (0 - p.z) * p.speed;
        } else {
          // Move towards scattered position
          p.x += (p.originX - p.x) * 0.05;
          p.y += (p.originY - p.y) * 0.05;
        }

        // Draw particle as small rectangle for cleaner text appearance
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);

        // Draw connecting lines for geometric effect (only when transitioning)
        var dx = Math.abs(p.x - p.targetX);
        var dy = Math.abs(p.y - p.targetY);
        if (dx > 5 || dy > 5) {
          if (i < particles.length - 1 && i % 3 === 0) {
            var nextP = particles[i + 1];
            var lineDx = nextP.x - p.x;
            var lineDy = nextP.y - p.y;
            var dist = Math.sqrt(lineDx * lineDx + lineDy * lineDy);
            if (dist < 20) {
              ctx.strokeStyle = 'rgba(240, 236, 228, 0.15)';
              ctx.lineWidth = 0.5;
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(nextP.x, nextP.y);
              ctx.stroke();
            }
          }
        }
      }

      animationRef.current = requestAnimationFrame(animate);
    }

    animate();

    return function() {
      if (animationRef.current) {
        cancelAnimationFrame(animationRef.current);
      }
    };
  }, [text, isVisible]);

  return h('canvas', {
    ref: canvasRef,
    className: 'particle-canvas'
  });
}

// Section component for main view
function Section(props) {
  var data = props.data;
  var onClick = props.onClick;
  var sectionRef = props.sectionRef;
  var isVisible = props.isVisible;

  return h('section', {
    className: "section" + (isVisible ? " visible" : ""),
    id: "section-" + data.id,
    onClick: onClick,
    ref: sectionRef
  },
    h('div', { className: "section-left" },
      h('div', { className: "title-row" },
        h(ParticleText, { text: data.title, isVisible: isVisible })
      )
    ),
    h('div', { className: "section-right" },
      h('img', {
        src: data.image,
        alt: data.title,
        className: "section-image",
        loading: "lazy"
      })
    )
  );
}

// Detail View with expanding animation
function DetailView(props) {
  var data = props.data;
  var isActive = props.isActive;
  var isExpanded = props.isExpanded;
  var initialRect = props.initialRect;
  var onClose = props.onClose;

  useEffect(function() {
    function handleKeyDown(e) {
      if (e.key === 'Escape' && isActive) {
        onClose();
      }
    }
    document.addEventListener('keydown', handleKeyDown);
    return function() {
      document.removeEventListener('keydown', handleKeyDown);
    };
  }, [isActive, onClose]);

  if (!data) return null;

  var galleryImages = data.gallery.map(function(src, index) {
    return h('img', {
      key: index,
      src: src,
      alt: data.title + " - Image " + (index + 1),
      className: "gallery-image"
    });
  });

  var metaItems = data.meta.map(function(item, index) {
    return h('div', { key: index, className: "detail-meta-item" },
      h('span', { className: "detail-meta-label" }, item.label),
      h('span', { className: "detail-meta-value" }, item.value)
    );
  });

  var frameStyle = initialRect ? {
    top: initialRect.top + 'px',
    left: initialRect.left + 'px',
    width: initialRect.width + 'px',
    height: initialRect.height + 'px'
  } : {};

  // Handle click to close - stop propagation on links to prevent closing
  function handleFrameClick(e) {
    // Don't close if clicking on a link
    if (e.target.tagName === 'A' || e.target.closest('a')) {
      return;
    }
    onClose();
  }

  // Only render meta section if there are meta items
  var metaSection = data.meta && data.meta.length > 0
    ? h('div', { className: "detail-meta" }, metaItems)
    : null;

  // Only render link if link exists
  var linkSection = data.link && data.linkText
    ? h('a', { href: data.link, className: "detail-link" },
        data.linkText,
        h(ArrowIcon)
      )
    : null;

  return h('div', { className: "detail-overlay" + (isActive ? " active" : "") },
    h('div', {
      className: "expanding-frame" + (isExpanded ? " expanded" : ""),
      style: frameStyle,
      onClick: handleFrameClick
    },
      h('div', { className: "detail-content-wrapper" },
        h('div', { className: "detail-left" },
          h('div', { className: "detail-header" },
            h('h1', { className: "detail-title" }, data.title),
            h('p', { className: "detail-subtitle" }, data.subtitle)
          ),
          h('p', { className: "detail-description" }, data.description),
          metaSection,
          linkSection
        ),
        h('div', { className: "detail-right" },
          h('div', { className: "gallery" }, galleryImages)
        )
      )
    )
  );
}

// Custom Cursor Component
function CustomCursor(props) {
  var isDetailView = props.isDetailView;
  var cursorRef = useRef(null);
  var positionRef = useRef({ x: 0, y: 0 });
  var targetRef = useRef({ x: 0, y: 0 });

  useEffect(function() {
    function handleMouseMove(e) {
      targetRef.current = { x: e.clientX, y: e.clientY };
    }

    function animate() {
      // Smooth follow with easing
      positionRef.current.x += (targetRef.current.x - positionRef.current.x) * 0.15;
      positionRef.current.y += (targetRef.current.y - positionRef.current.y) * 0.15;

      if (cursorRef.current) {
        cursorRef.current.style.transform =
          'translate(' + positionRef.current.x + 'px, ' + positionRef.current.y + 'px)';
      }

      requestAnimationFrame(animate);
    }

    document.addEventListener('mousemove', handleMouseMove);
    animate();

    return function() {
      document.removeEventListener('mousemove', handleMouseMove);
    };
  }, []);

  // Open: visible when not in detail view, slides up to hide
  // Close: hidden below, slides up to show when in detail view
  var openClass = 'cursor-label open' + (isDetailView ? ' hidden' : '');
  var closeClass = 'cursor-label close' + (isDetailView ? ' visible' : '');

  return h('div', { className: 'custom-cursor', ref: cursorRef },
    h('div', { className: 'cursor-label-container' },
      h('span', { className: openClass }, 'Open'),
      h('span', { className: closeClass }, 'Close')
    )
  );
}

// Main App component
function App() {
  var selectedState = useState(null);
  var selectedSection = selectedState[0];
  var setSelectedSection = selectedState[1];

  var rectState = useState(null);
  var initialRect = rectState[0];
  var setInitialRect = rectState[1];

  var expandedState = useState(false);
  var isExpanded = expandedState[0];
  var setIsExpanded = expandedState[1];

  var currentSectionState = useState(0);
  var currentSection = currentSectionState[0];
  var setCurrentSection = currentSectionState[1];

  // Track transition state: null, 'up', or 'down'
  var transitionState = useState(null);
  var transitionDirection = transitionState[0];
  var setTransitionDirection = transitionState[1];

  // Next section to transition to
  var nextSectionState = useState(null);
  var nextSection = nextSectionState[0];
  var setNextSection = nextSectionState[1];

  // Track if animation should be active
  var animatingState = useState(false);
  var isAnimating = animatingState[0];
  var setIsAnimating = animatingState[1];

  // Loading state
  var loadingState = useState(true);
  var isLoading = loadingState[0];
  var setIsLoading = loadingState[1];

  var loadingProgressState = useState(0);
  var loadingProgress = loadingProgressState[0];
  var setLoadingProgress = loadingProgressState[1];

  // Track if particle animation should start (after loading)
  var particleReadyState = useState(false);
  var isParticleReady = particleReadyState[0];
  var setIsParticleReady = particleReadyState[1];

  // Track particle animation key for forcing re-mount on section change
  var particleKeyState = useState(0);
  var particleKey = particleKeyState[0];
  var setParticleKey = particleKeyState[1];

  // Track if particle animation should be delayed after section change
  var particleDelayState = useState(false);
  var isParticleDelayed = particleDelayState[0];
  var setIsParticleDelayed = particleDelayState[1];

  var containerRef = useRef(null);
  var sectionRefs = useRef([]);
  var isScrollingRef = useRef(false);
  var currentSectionRef = useRef(0);

  // Loading effect - preload images and prepare particles
  useEffect(function() {
    var imagesToLoad = [];
    sections.forEach(function(section) {
      imagesToLoad.push(section.image);
      if (section.gallery) {
        section.gallery.forEach(function(img) {
          if (imagesToLoad.indexOf(img) === -1) {
            imagesToLoad.push(img);
          }
        });
      }
    });
    // Add logo
    imagesToLoad.push('images/ロゴ.png');

    var loadedCount = 0;
    var totalImages = imagesToLoad.length;

    function checkAllLoaded() {
      loadedCount++;
      var progress = Math.round((loadedCount / totalImages) * 100);
      setLoadingProgress(progress);

      if (loadedCount >= totalImages) {
        // All images loaded, wait a bit then hide loading screen
        setTimeout(function() {
          setIsLoading(false);
          // Start particle animation after loading screen fades out
          setTimeout(function() {
            setIsParticleReady(true);
          }, 500);
        }, 500);
      }
    }

    imagesToLoad.forEach(function(src) {
      var img = new Image();
      img.onload = checkAllLoaded;
      img.onerror = checkAllLoaded; // Count even if error
      img.src = src;
    });

    // Fallback timeout in case images take too long
    setTimeout(function() {
      if (isLoading) {
        setLoadingProgress(100);
        setTimeout(function() {
          setIsLoading(false);
          setTimeout(function() {
            setIsParticleReady(true);
          }, 500);
        }, 300);
      }
    }, 5000);
  }, []);

  // Handle wheel events for section navigation
  useEffect(function() {
    var container = containerRef.current;
    if (!container) return;

    var wheelAccumulator = 0;
    var wheelThreshold = 100;

    function navigateToSection(targetIndex, direction) {
      if (isScrollingRef.current) return;

      isScrollingRef.current = true;

      // Set direction and next section together for initial positioning
      setTransitionDirection(direction);
      setNextSection(targetIndex);

      // Start animation after a frame to ensure initial position is rendered
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          setIsAnimating(true);
        });
      });

      // After animation, update current section
      setTimeout(function() {
        currentSectionRef.current = targetIndex;
        setCurrentSection(targetIndex);
        setTransitionDirection(null);
        setNextSection(null);
        setIsAnimating(false);

        // Reset particle animation - increment key and delay visibility
        setIsParticleDelayed(true);
        setParticleKey(function(prev) { return prev + 1; });

        // After a short delay, start particle animation
        setTimeout(function() {
          setIsParticleDelayed(false);
          isScrollingRef.current = false;
          wheelAccumulator = 0;
        }, 100);
      }, 1300);
    }

    function handleWheel(e) {
      e.preventDefault();

      if (isScrollingRef.current) return;

      wheelAccumulator += e.deltaY;

      if (wheelAccumulator > wheelThreshold) {
        // Scrolling down - go to next section
        var target = currentSectionRef.current + 1;
        if (target >= sections.length) {
          target = 0; // Loop to first
        }
        wheelAccumulator = 0;
        navigateToSection(target, 'down');
      } else if (wheelAccumulator < -wheelThreshold) {
        // Scrolling up - go to previous section
        var target = currentSectionRef.current - 1;
        if (target < 0) {
          target = sections.length - 1; // Loop to last
        }
        wheelAccumulator = 0;
        navigateToSection(target, 'up');
      }
    }

    container.addEventListener('wheel', handleWheel, { passive: false });

    return function() {
      container.removeEventListener('wheel', handleWheel);
    };
  }, []);

  function handleSectionClick(sectionData, index) {
    var sectionEl = sectionRefs.current[index];
    if (sectionEl) {
      var rect = sectionEl.getBoundingClientRect();
      setInitialRect(rect);
      setSelectedSection(sectionData);

      setTimeout(function() {
        setIsExpanded(true);
      }, 50);
    }
  }

  function handleClose() {
    setIsExpanded(false);
    setTimeout(function() {
      setSelectedSection(null);
      setInitialRect(null);
    }, 600);
  }

  // Render current and next sections for transition
  var currentSectionData = sections[currentSection];
  var nextSectionData = nextSection !== null ? sections[nextSection] : null;

  var isParticleVisible = isParticleReady && selectedSection === null && transitionDirection === null && !isParticleDelayed;

  // Current section element
  var currentSectionClass = 'section-wrapper';
  if (isAnimating && transitionDirection) {
    currentSectionClass += ' transitioning-' + transitionDirection;
  }

  var currentSectionEl = h('div', {
    key: 'current-' + currentSection,
    className: currentSectionClass,
    ref: function(el) { sectionRefs.current[currentSection] = el; }
  },
    h('section', {
      className: 'section',
      onClick: function() { handleSectionClick(currentSectionData, currentSection); }
    },
      h('div', { className: 'section-left' },
        h('div', { className: 'title-row' },
          h(ParticleText, { key: 'particle-' + currentSection + '-' + particleKey, text: currentSectionData.title, isVisible: isParticleVisible })
        )
      ),
      h('div', { className: 'section-right' },
        h('img', {
          src: currentSectionData.image,
          alt: currentSectionData.title,
          className: 'section-image'
        })
      )
    )
  );

  // Next section element (only during transition)
  var nextSectionClass = 'section-wrapper next-section';
  if (transitionDirection === 'down') {
    nextSectionClass += ' from-bottom';
  } else if (transitionDirection === 'up') {
    nextSectionClass += ' from-top';
  }
  if (isAnimating) {
    nextSectionClass += ' animating';
  }

  var nextSectionEl = nextSectionData ? h('div', {
    key: 'next-' + nextSection,
    className: nextSectionClass
  },
    h('section', {
      className: 'section'
    },
      h('div', { className: 'section-left' },
        h('div', { className: 'title-row' },
          h(ParticleText, { text: nextSectionData.title, isVisible: false })
        )
      ),
      h('div', { className: 'section-right' },
        h('img', {
          src: nextSectionData.image,
          alt: nextSectionData.title,
          className: 'section-image'
        })
      )
    )
  ) : null;

  return h(Fragment, null,
    h(LoadingScreen, { isVisible: isLoading, progress: loadingProgress }),
    h(CustomCursor, { isDetailView: selectedSection !== null }),
    h('div', {
      className: 'scroll-container' + (selectedSection ? ' hidden' : ''),
      ref: containerRef
    },
      currentSectionEl,
      nextSectionEl
    ),
    h(DetailView, {
      data: selectedSection,
      isActive: selectedSection !== null,
      isExpanded: isExpanded,
      initialRect: initialRect,
      onClose: handleClose
    })
  );
}

// Render the app
var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
  </script>
</body>
</html>
